name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Create application.yml
        env:
          APPLICATION_YML: ${{ secrets.APPLICATION_YML }}
        run: |
          # envsubst 제거 (#19): APPLICATION_YML 내 ${...} 토큰이 GitHub Actions
          # 자동 주입 env(GITHUB_TOKEN, RUNNER_*)로 치환되는 것을 방지.
          printf '%s\n' "$APPLICATION_YML" > src/main/resources/application.yml

      - name: Build with Gradle
        run: ./gradlew bootJar

      - name: Create deploy package
        run: |
          mkdir -p scripts
          zip -r deployment-package.zip build/libs/discord-bot.jar appspec.yml scripts/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          aws s3 cp deployment-package.zip "s3://${S3_BUCKET_NAME}/deployment-package.zip"

      - name: Deploy to CodeDeploy
        env:
          APPLICATION_NAME: ${{ secrets.APPLICATION_NAME }}
          DEPLOYMENT_GROUP_NAME: ${{ secrets.DEPLOYMENT_GROUP_NAME }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          aws deploy create-deployment \
            --application-name "${APPLICATION_NAME}" \
            --deployment-group-name "${DEPLOYMENT_GROUP_NAME}" \
            --s3-location "bucket=${S3_BUCKET_NAME},key=deployment-package.zip,bundleType=zip"
