name: Deploy

on:
  push:
    tags:
      - 'v[1-9]*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Create .env from secret
        uses: ./.github/actions/create-dotenv
        with:
          dotenv: ${{ secrets.DOTENV }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prune devDependencies
        run: npm prune --omit=dev

      - name: Create deploy package
        run: zip -r deployment-package.zip dist/ node_modules/ package.json package-lock.json appspec.yml scripts/ .env

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          aws s3 cp deployment-package.zip "s3://${S3_BUCKET_NAME}/deployment-package.zip"

      - name: Deploy to CodeDeploy
        env:
          APPLICATION_NAME: ${{ secrets.APPLICATION_NAME }}
          DEPLOYMENT_GROUP_NAME: ${{ secrets.DEPLOYMENT_GROUP_NAME }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          aws deploy create-deployment \
            --application-name "${APPLICATION_NAME}" \
            --deployment-group-name "${DEPLOYMENT_GROUP_NAME}" \
            --s3-location "bucket=${S3_BUCKET_NAME},key=deployment-package.zip,bundleType=zip"
