name: CI

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'src/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'src/**'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Create application.yml
        uses: ./.github/actions/create-application-yml
        with:
          application-yml: ${{ secrets.APPLICATION_YML }}

      - name: Build with Gradle
        run: ./gradlew bootJar
