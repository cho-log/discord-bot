name: Create .env
description: DOTENV secret을 checkout 루트의 .env로 복사 (checkout 후 사용)

inputs:
  dotenv:
    description: |
      DOTENV secret 내용. dotenv 형식 (KEY=VALUE 줄 단위).
      .env.example 참고하여 필요한 키 모두 포함되어야 한다.
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        DOTENV: ${{ inputs.dotenv }}
      run: |
        # DOTENV가 비어있거나 공백만 있으면 차단
        # (공백 제거 후 길이 체크: GitHub secret 미등록 또는 잘못된 값 검출)
        STRIPPED=$(printf '%s' "$DOTENV" | tr -d '[:space:]')
        if [ -z "$STRIPPED" ]; then
          echo "::error::DOTENV secret is missing or contains only whitespace." >&2
          echo "::error::Register secrets.DOTENV in repository settings." >&2
          echo "::error::Format: dotenv (KEY=VALUE per line). See .env.example for required keys." >&2
          exit 1
        fi
        printf '%s\n' "$DOTENV" > .env
        chmod 600 .env
